version: '3.8'

services:
  api:
    build:
      context: ./server
      target: builder
    command: npm run dev
    ports:
      - "5000:5000"
    volumes:
      # Sync our local code to the container in real-time
      - ./server:/usr/src/app
      # Prevent local node_modules from overriding the container's linux-based modules
      - /usr/src/app/node_modules
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://db:27017/notesdb
    depends_on:
      - db

  db:
    image: mongo:6-jammy
    ports:
      - "27017:27017"
    volumes:
      # Persist database data even if the container is destroyed
      - mongo_data:/data/db

volumes:
  mongo_data: