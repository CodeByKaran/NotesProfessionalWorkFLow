services:
  client:
    build:
      context: ./client
    ports:
      - "5173:5173"
    develop:
      watch:
        # Sync source code and public assets instantly
        - action: sync
          path: ./client/src
          target: /usr/src/app/src
        - action: sync
          path: ./client/public
          target: /usr/src/app/public
        - action: sync
          path: ./client/index.html
          target: /usr/src/app/index.html
        # If we install a new package, automatically rebuild the container
        - action: rebuild
          path: ./client/package.json
    depends_on:
      - api

  api:
    build:
      context: ./server
      target: builder
    command: npm run dev
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://db:27017/notesdb
    develop:
      watch:
        # Sync backend source code instantly (tsx watch will handle the restart)
        - action: sync
          path: ./server/src
          target: /usr/src/app/src
        # Rebuild if we install new backend packages
        - action: rebuild
          path: ./server/package.json
    depends_on:
      - db

  db:
    image: mongo:6-jammy
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: