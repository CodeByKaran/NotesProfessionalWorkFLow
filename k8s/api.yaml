apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  replicas: 2 # Let's run 2 copies of your backend for High Availability!
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        # Pulling your freshly compiled image from GHCR
        image: ghcr.io/codebykaran/notesprofessionalworkflow-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
        # Notice how we point to the mongo-service name we created above
        - name: MONGO_URI
          value: "mongodb://mongo-service:27017/notesdb"

---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: api
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000