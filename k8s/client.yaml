apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
      - name: client
        image: ghcr.io/codebykaran/notesprofessionalworkflow-client:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5173

---
apiVersion: v1
kind: Service
metadata:
  name: client-service
spec:
  type: LoadBalancer # This exposes the frontend to the public internet
  selector:
    app: client
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5173